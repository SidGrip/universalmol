description "UniversalMolecule Daemon"

start on runlevel [2345]
stop on starting rc RUNLEVEL=[016]

env UNIVERSALMOLECULED_BIN="/usr/bin/universalmoleculed"
env UNIVERSALMOLECULED_USER="universalmolecule"
env UNIVERSALMOLECULED_GROUP="universalmolecule"
env UNIVERSALMOLECULED_PIDDIR="/var/run/universalmoleculed"
# upstart can't handle variables constructed with other variables
env UNIVERSALMOLECULED_PIDFILE="/var/run/universalmoleculed/universalmoleculed.pid"
env UNIVERSALMOLECULED_CONFIGFILE="/etc/universalmolecule/universalmolecule.conf"
env UNIVERSALMOLECULED_DATADIR="/var/lib/universalmoleculed"

expect fork

respawn
respawn limit 5 120
kill timeout 600

pre-start script
    # this will catch non-existent config files
    # universalmoleculed will check and exit with this very warning, but it can do so
    # long after forking, leaving upstart to think everything started fine.
    # since this is a commonly encountered case on install, just check and
    # warn here.
    if ! grep -qs '^rpcpassword=' "$UNIVERSALMOLECULED_CONFIGFILE" ; then
        echo "ERROR: You must set a secure rpcpassword to run universalmoleculed."
        echo "The setting must appear in $UNIVERSALMOLECULED_CONFIGFILE"
        echo
        echo "This password is security critical to securing wallets "
        echo "and must not be the same as the rpcuser setting."
        echo "You can generate a suitable random password using the following "
        echo "command from the shell:"
        echo
        echo "bash -c 'tr -dc a-zA-Z0-9 < /dev/urandom | head -c32 && echo'"
        echo
        echo "It is recommended that you also set alertnotify so you are "
        echo "notified of problems:"
        echo
        echo "ie: alertnotify=echo %%s | mail -s \"UniversalMolecule Alert\"" \
            "admin@foo.com"
        echo
        exit 1
    fi

    mkdir -p "$UNIVERSALMOLECULED_PIDDIR"
    chmod 0755 "$UNIVERSALMOLECULED_PIDDIR"
    chown $UNIVERSALMOLECULED_USER:$UNIVERSALMOLECULED_GROUP "$UNIVERSALMOLECULED_PIDDIR"
    chown $UNIVERSALMOLECULED_USER:$UNIVERSALMOLECULED_GROUP "$UNIVERSALMOLECULED_CONFIGFILE"
    chmod 0660 "$UNIVERSALMOLECULED_CONFIGFILE"
end script

exec start-stop-daemon \
    --start \
    --pidfile "$UNIVERSALMOLECULED_PIDFILE" \
    --chuid $UNIVERSALMOLECULED_USER:$UNIVERSALMOLECULED_GROUP \
    --exec "$UNIVERSALMOLECULED_BIN" \
    -- \
    -pid="$UNIVERSALMOLECULED_PIDFILE" \
    -conf="$UNIVERSALMOLECULED_CONFIGFILE" \
    -datadir="$UNIVERSALMOLECULED_DATADIR" \
    -disablewallet \
    -daemon

